<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="manifest" href="manifest.json">
  <title>Lista de Compras</title>
  <style>
    :root{
      --green:#16a34a; --green2:#22c55e; --dark:#111827; --muted:#6b7280;
      --bg:#f3f4f6; --border:#e5e7eb; --red:#dc2626; --blue:#2563eb;
      --card:#ffffff; --soft:#f9fafb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#dcfce7 0%,#f3f4f6 170px);color:var(--dark)}
    .app{max-width:540px;margin:0 auto;min-height:100vh;background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    header{padding:22px 16px 12px;color:white;background:linear-gradient(135deg,#16a34a,#22c55e);border-bottom-left-radius:30px;border-bottom-right-radius:30px}
    .header-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .icon{width:48px;height:48px;border-radius:18px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:26px}
    h1{margin:0;font-size:25px;line-height:1.1}
    header p{margin:6px 0 0;opacity:.92;font-size:14px}
    .toolbar{padding:14px;display:grid;gap:9px;background:#fff;border-bottom:1px solid var(--border)}
    label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
    input,select{width:100%;border:1px solid var(--border);border-radius:14px;padding:12px;font-size:16px;background:white;min-height:45px}
    button{border:0;border-radius:14px;padding:12px 13px;font-size:15px;font-weight:800;cursor:pointer;min-height:45px}
    .row{display:grid;grid-template-columns:1fr auto;gap:8px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .primary{background:var(--green);color:white}
    .secondary{background:#e5e7eb;color:#111827}
    .danger{background:#fee2e2;color:var(--red)}
    .blue{background:#dbeafe;color:var(--blue)}
    .summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:14px;background:#f9fafb}
    .box{background:white;border:1px solid var(--border);border-radius:20px;padding:12px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .box span{display:block;color:var(--muted);font-size:12px}
    .box strong{display:block;font-size:16px;margin-top:4px}
    .new{margin:0 14px 12px;background:#f9fafb;border:1px solid var(--border);border-radius:24px;padding:13px}
    .grid-product{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .product-input{grid-column:1/4}
    .items{padding:0 14px 130px}
    .item{border:1px solid var(--border);border-radius:24px;padding:13px;margin-bottom:11px;background:white;box-shadow:0 3px 12px rgba(0,0,0,.05)}
    .item.done{background:#ecfdf5;border-color:#bbf7d0}
    .top{display:flex;gap:10px;align-items:center}
    .check{width:34px;height:34px;border-radius:50%;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;background:white;font-size:20px;padding:0}
    .done .check{background:var(--green)}
    .product{flex:1;font-weight:900;font-size:18px;border:0;border-bottom:1px solid var(--border);border-radius:0;padding:6px 2px;background:transparent;min-height:auto}
    .done .product{text-decoration:line-through;color:var(--muted)}
    .line2{display:grid;grid-template-columns:1fr 92px 1fr 92px;gap:8px;margin-top:9px}
    .line2 label{margin:0}
    .full{grid-column:span 2}
    .total-row{margin-top:11px;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .item-total{font-weight:900;color:#15803d;font-size:16px}
    .footer{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:540px;background:white;border-top:1px solid var(--border);padding:14px 16px calc(14px + env(safe-area-inset-bottom));display:flex;justify-content:space-between;align-items:center;box-shadow:0 -6px 18px rgba(0,0,0,.08)}
    .footer span{display:block;color:var(--muted);font-size:12px}
    .footer strong{display:block;font-size:23px;color:#15803d}
    .small strong{font-size:16px;color:var(--dark)}
    .hint{color:var(--muted);font-size:13px;margin:2px 0 0;line-height:1.35}
    @media(max-width:390px){
      .line2{grid-template-columns:1fr 82px}
      .full{grid-column:span 2}
      .row3{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-row">
        <div>
          <h1>Lista de Compras</h1>
          <p id="currentTitle">Varias listas guardadas</p>
        </div>
        <div class="icon">🛒</div>
      </div>
    </header>

    <section class="toolbar">
      <div>
        <label>Lista activa</label>
        <select id="listSelector" onchange="switchList(this.value)"></select>
      </div>

      <div class="row">
        <input id="newListName" placeholder="Ej: Lista Feria Nona">
        <button class="primary" onclick="createList()">Crear</button>
      </div>

      <div class="row3">
        <button class="blue" onclick="renameList()">Renombrar</button>
        <button class="secondary" onclick="duplicateList()">Duplicar</button>
        <button class="danger" onclick="deleteList()">Borrar</button>
      </div>
      <p class="hint">Puedes tener una lista para Nona, otra para Ivania, supermercado, cumpleaños, etc.</p>
    </section>

    <section class="summary">
      <div class="box"><span>Total</span><strong id="totalTop">$0</strong></div>
      <div class="box"><span>Comprados</span><strong id="countDone">0</strong></div>
      <div class="box"><span>Faltan</span><strong id="countPending">0</strong></div>
    </section>

    <section class="new">
      <div class="grid-product">
        <input class="product-input" id="newName" placeholder="Producto">
        <input id="newQty" placeholder="Cant." inputmode="decimal" value="1">
        <select id="newUnit">
          <option value="un">un</option>
          <option value="kg">kg</option>
          <option value="g">g</option>
          <option value="pack">pack</option>
          <option value="bolsa">bolsa</option>
          <option value="caja">caja</option>
          <option value="lt">lt</option>
        </select>
        <input id="newPrice" placeholder="Precio unit." inputmode="numeric">
      </div>
      <button class="primary" style="width:100%;margin-top:9px" onclick="addItem()">Agregar producto</button>
    </section>

    <main class="items" id="items"></main>

    <footer class="footer">
      <div class="small">
        <span>Gastado marcado</span>
        <strong id="doneTotal">$0</strong>
      </div>
      <div style="text-align:right">
        <span>Total lista</span>
        <strong id="grandTotal">$0</strong>
      </div>
    </footer>
  </div>

  <script>
    const units = ["un","kg","g","pack","bolsa","caja","lt"];
    const starterItems = [
      { id: 1, qty: "1", unit: "kg", boughtQty: "", boughtUnit:"kg", unitPrice: "", producto: "Manzana", paid: "", done: false },
      { id: 2, qty: "2", unit: "kg", boughtQty: "", boughtUnit:"kg", unitPrice: "", producto: "Membrillo", paid: "", done: false },
      { id: 3, qty: "0,5", unit: "kg", boughtQty: "", boughtUnit:"kg", unitPrice: "", producto: "Zanahoria", paid: "", done: false },
      { id: 4, qty: "3", unit: "un", boughtQty: "", boughtUnit:"un", unitPrice: "", producto: "Pimentón", paid: "", done: false },
      { id: 5, qty: "1", unit: "un", boughtQty: "", boughtUnit:"un", unitPrice: "", producto: "Lechuga", paid: "", done: false }
    ];

    const defaultData = {
      activeId: "lista-feria-nona",
      lists: [
        { id: "lista-feria-nona", name: "Lista Feria Nona", items: starterItems },
        { id: "lista-feria-ivania", name: "Lista Feria Ivania", items: [] }
      ]
    };

    let data = JSON.parse(localStorage.getItem("listaComprasMultiCristobalV3") || "null") || defaultData;

    function save(){ localStorage.setItem("listaComprasMultiCristobalV3", JSON.stringify(data)); }
    function activeList(){ return data.lists.find(l => l.id === data.activeId) || data.lists[0]; }
    function slug(name){ return name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"") + "-" + Date.now(); }
    const money = n => new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",maximumFractionDigits:0}).format(n||0);
    function parsePrice(v){ return Number(String(v||"").replace(/[^0-9]/g,"")) || 0; }
    function parseQty(v){ return Number(String(v||"").replace(",",".").replace(/[^0-9.]/g,"")) || 0; }
    function clean(v){ return String(v||"").replace(/"/g,"&quot;"); }
    function options(selected){ return units.map(u => `<option value="${u}" ${u===selected?"selected":""}>${u}</option>`).join(""); }
    function itemTotal(item){
      const manual = parsePrice(item.paid);
      if(manual>0) return manual;
      const qty = parseQty(item.boughtQty || item.qty);
      return qty * parsePrice(item.unitPrice);
    }
    function refreshSelector(){
      const selector=document.getElementById("listSelector");
      selector.innerHTML="";
      data.lists.forEach(list=>{
        const opt=document.createElement("option");
        opt.value=list.id; opt.textContent=list.name;
        if(list.id===data.activeId) opt.selected=true;
        selector.appendChild(opt);
      });
    }
    function switchList(id){ data.activeId=id; save(); render(); }
    function createList(){
      const input=document.getElementById("newListName");
      const name=input.value.trim();
      if(!name) return alert("Escribe un nombre para la lista.");
      const list={id:slug(name),name,items:[]};
      data.lists.push(list); data.activeId=list.id; input.value=""; save(); render();
    }
    function renameList(){
      const list=activeList();
      const name=prompt("Nuevo nombre de la lista:",list.name);
      if(!name||!name.trim()) return;
      list.name=name.trim(); save(); render();
    }
    function duplicateList(){
      const list=activeList();
      const copy=JSON.parse(JSON.stringify(list));
      copy.id=slug(list.name+" copia"); copy.name=list.name+" copia";
      copy.items=copy.items.map(i=>({...i,id:Date.now()+Math.floor(Math.random()*100000)}));
      data.lists.push(copy); data.activeId=copy.id; save(); render();
    }
    function deleteList(){
      if(data.lists.length<=1) return alert("Debe existir al menos una lista.");
      const list=activeList();
      if(!confirm("¿Borrar "+list.name+"?")) return;
      data.lists=data.lists.filter(l=>l.id!==list.id);
      data.activeId=data.lists[0].id; save(); render();
    }
    function update(id,field,value){
      const list=activeList();
      list.items=list.items.map(i=>i.id===id?{...i,[field]:value}:i);
      save(); render();
    }
    function toggle(id){
      const list=activeList();
      list.items=list.items.map(i=>i.id===id?{...i,done:!i.done}:i);
      save(); render();
    }
    function removeItem(id){
      const list=activeList();
      list.items=list.items.filter(i=>i.id!==id);
      save(); render();
    }
    function addItem(){
      const producto=document.getElementById("newName").value.trim();
      if(!producto) return;
      const list=activeList();
      const unit=document.getElementById("newUnit").value;
      list.items.push({
        id:Date.now(),
        qty:document.getElementById("newQty").value||"1",
        unit,
        boughtQty:"",
        boughtUnit:unit,
        unitPrice:document.getElementById("newPrice").value||"",
        producto,
        paid:"",
        done:false
      });
      document.getElementById("newName").value="";
      document.getElementById("newPrice").value="";
      save(); render();
    }
    function render(){
      if(!data.lists.length) data=defaultData;
      const list=activeList();
      refreshSelector();
      document.getElementById("currentTitle").textContent=list.name;
      const listEl=document.getElementById("items");
      listEl.innerHTML="";
      if(!list.items.length){
        listEl.innerHTML='<p class="hint" style="text-align:center;margin-top:18px;">Esta lista está vacía. Agrega el primer producto arriba.</p>';
      }
      list.items.forEach(item=>{
        if(item.pedida && !item.qty){
          item.qty = item.pedida.replace(/[^0-9,.]/g,"") || "1";
          item.unit = item.pedida.includes("kg") ? "kg" : "un";
          item.unitPrice = item.unitario || "";
          item.paid = item.pagado || "";
        }
        const div=document.createElement("div");
        div.className="item"+(item.done?" done":"");
        div.innerHTML=`
          <div class="top">
            <button class="check" onclick="toggle(${item.id})">${item.done?"✓":""}</button>
            <input class="product" value="${clean(item.producto)}" onchange="update(${item.id}, 'producto', this.value)">
          </div>

          <div class="line2">
            <label>Cant. pedida
              <input value="${clean(item.qty)}" inputmode="decimal" onchange="update(${item.id}, 'qty', this.value)">
            </label>
            <label>Unidad
              <select onchange="update(${item.id}, 'unit', this.value)">${options(item.unit||"un")}</select>
            </label>

            <label>Cant. comprada
              <input placeholder="Ej: 1,5" value="${clean(item.boughtQty)}" inputmode="decimal" onchange="update(${item.id}, 'boughtQty', this.value)">
            </label>
            <label>Unidad
              <select onchange="update(${item.id}, 'boughtUnit', this.value)">${options(item.boughtUnit||item.unit||"un")}</select>
            </label>

            <label class="full">Precio unitario / kg / un
              <input inputmode="numeric" placeholder="$" value="${clean(item.unitPrice)}" onchange="update(${item.id}, 'unitPrice', this.value)">
            </label>
            <label class="full">Valor final pagado
              <input inputmode="numeric" placeholder="Manual, si cambia" value="${clean(item.paid)}" onchange="update(${item.id}, 'paid', this.value)">
            </label>
          </div>

          <div class="total-row">
            <div class="item-total">Total ítem: ${money(itemTotal(item))}</div>
            <button class="danger" onclick="removeItem(${item.id})">Borrar</button>
          </div>
        `;
        listEl.appendChild(div);
      });
      const total=list.items.reduce((s,i)=>s+itemTotal(i),0);
      const doneTotal=list.items.filter(i=>i.done).reduce((s,i)=>s+itemTotal(i),0);
      document.getElementById("totalTop").textContent=money(total);
      document.getElementById("grandTotal").textContent=money(total);
      document.getElementById("doneTotal").textContent=money(doneTotal);
      document.getElementById("countDone").textContent=list.items.filter(i=>i.done).length;
      document.getElementById("countPending").textContent=list.items.filter(i=>!i.done).length;
    }
    if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
    render();
  </script>
</body>
</html>
